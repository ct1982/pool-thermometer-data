//# 🏊‍♂️ Pool-Thermometer Weboberfläche
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Temperatur Live</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card-color);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 320px;
        }
        h1 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .gauge {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: conic-gradient(var(--accent-color) 0%, #334155 0%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            transition: background 0.5s ease-in-out;
        }
        .gauge::before {
            content: '';
            position: absolute;
            width: 174px;
            height: 174px;
            background-color: var(--card-color);
            border-radius: 50%;
        }
        .temp-display {
            position: relative;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-color);
        }
        .unit {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--accent-color);
            vertical-align: super;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #334155;
        }
        .stat-box {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .stat-value {
            font-weight: bold;
            color: var(--text-color);
            margin-top: 2px;
        }
        .updated {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Pool Wassertemperatur</h1>
    <div class="gauge" id="gauge">
        <div class="temp-display" id="temp">--<span class="unit">°C</span></div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-box">🔋 Batterie<div class="stat-value" id="bat">--</div></div>
        <div class="stat-box">📶 Wi-Fi<div class="stat-value" id="wifi">--</div></div>
        <div class="stat-box">🔵 BLE<div class="stat-value" id="ble">--</div></div>
    </div>

    <div class="updated" id="time">Lade Live-Daten...</div>
</div>

<script>
    async function updateData() {
        try {
            const response = await fetch('./pool-thermometer.json?t=' + new Date().getTime());
            const data = await response.json();
            
            // Anpassung an Ihre JSON-Struktur
            const temp = parseFloat(data.pool_temp).toFixed(1);
            const timeStr = data.timestamp;
            const battery = data.battery + "%";
            const wifi = data.wifi_rssi + " dBm";
            const ble = data.ble_rssi + " dBm";

            // Zeitstempel zerlegen (erwartet "2026-07-09 12:20:00")
            const rawTimestamp = data.timestamp; // z.B. "2026-07-09 12:20:00"
            const parts = rawTimestamp.split(' '); // Trennt Datum und Uhrzeit am Leerzeichen
            
            const dateParts = parts[0].split('-'); // Zerteilt "2026-07-09" bei den Bindestrichen
            const timeParts = parts[1].split(':'); // Zerteilt "12:20:00" bei den Doppelpunkten

            // Neues deutsches Format zusammenbauen: "09.07.2026 - 12:20 Uhr"
            const formattedTime = `${dateParts[2]}.${dateParts[1]}.${dateParts[0]} - ${timeParts[0]}:${timeParts[1]} Uhr`;
            
            // HTML Elemente befüllen
            document.getElementById('temp').innerHTML = `${temp}<span class="unit">°C</span>`;
            document.getElementById('bat').innerText = battery;
            document.getElementById('wifi').innerText = wifi;
            document.getElementById('ble').innerText = ble;
            
            //document.getElementById('time').innerHTML = `Messung vom: ${timeStr}`;
            // Hier wird das neue, formatierte Datum eingesetzt:
            document.getElementById('time').innerHTML = `Messung vom: ${formattedTime}`;

            
            // Kreis-Diagramm berechnen (Bereich 0°C bis 40°C)
            const percent = Math.min(Math.max((temp / 40) * 100, 0), 100);
            document.getElementById('gauge').style.background = `conic-gradient(var(--accent-color) ${percent}%, #334155 ${percent}%)`;
            
        } catch (error) {
            console.error("Fehler beim Laden der Pool-Daten:", error);
            document.getElementById('time').innerHTML = "Verbindungsfehler...";
        }
    }

    // Sofort laden und alle 30 Sekunden aktualisieren
    updateData();
    setInterval(updateData, 30000);
</script>
</body>
</html>
